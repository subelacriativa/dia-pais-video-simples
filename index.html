<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma Surpresa Especial Para Você! ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Cartão de Mensagem Principal */
        .cartao-surpresa {
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 35px 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: surgir 0.8s ease-out;
        }

        .icone-coracao {
            font-size: 3rem;
            color: #ff5e62;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulsar 1.5s infinite;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Bloco da Mensagem Bonita */
        .mensagem {
            color: #5a6c7d;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-style: italic;
            background: #f9fbfc;
            padding: 20px;
            border-radius: 16px;
            border-left: 4px solid #ff5e62;
        }

        /* Botão de Play Premium */
        .btn-play {
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 20px rgba(255, 94, 98, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-play:active {
            transform: scale(0.98);
            box-shadow: 0 3px 10px rgba(255, 94, 98, 0.4);
        }

        /* Elemento de Vídeo Escondido (Só aparece em tela cheia) */
        video {
            display: none;
        }

        /* Animações Charmosas */
        @keyframes surgir {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Rodapé com a sua marca */
        .rodape {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #a0aec0;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="cartao-surpresa">
        <span class="icone-coracao">❤️</span>
        <h1>Para o Melhor Pai!</h1>
        
        <div class="mensagem">
            "Pai, cada momento ao seu lado é uma memória que guardo para sempre no coração. Obrigado por ser meu porto seguro, meu herói e meu melhor amigo. Preparei uma surpresa em vídeo para você lembrar o quanto te amo!"
        </div>

        <button class="btn-play" id="player-trigger">
            <span>▶️</span> CLIQUE AQUI PARA VER A MÁGICA
        </button>

        <div class="rodape">SU BELA CRIATIVA</div>
    </div>

    <video id="video-principal" src="https://raw.githubusercontent.com/subelacriativa/ra/main/20260524_083410.mp4" crossorigin="anonymous" playsinline webkit-playsinline></video>

    <script>
        const botao = document.getElementById('player-trigger');
        const video = document.getElementById('video-principal');

        botao.addEventListener('click', function() {
            // 1. Inicia a reprodução do vídeo
            video.play().then(() => {
                // 2. Força o vídeo a entrar em modo tela cheia nativo do celular
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) { /* Safari / iOS */
                    video.webkitRequestFullscreen();
                } else if (video.msRequestFullscreen) {
                    video.msRequestFullscreen();
                }
            }).catch(error => {
                console.log("Erro ao abrir o vídeo:", error);
                alert("Por favor, tente clicar novamente para liberar o vídeo!");
            });
        });

        // Caso o pai saia da tela cheia, o vídeo pausa automaticamente para não ficar rodando de fundo
        document.addEventListener('fullscreenchange', handleFullscreenExit);
        document.addEventListener('webkitfullscreenchange', handleFullscreenExit);

        function handleFullscreenExit() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                video.pause();
            }
        }
    </script>
</body>
</html>
