<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Realidade Aumentada ✨</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #instrucao {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); color: white; padding: 12px 24px;
            border-radius: 30px; z-index: 999; text-align: center; font-size: 0.9rem; width: 80%;
        }
    </style>
</head>
<body>

    <div id="instrucao">Mostre o marcador HIRO para a câmera! 📱</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <video id="video-teste" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-marker preset="hiro" id="marcador">
            <a-video src="#video-teste" width="1.8" height="1.0" position="0 0.2 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marcador = document.querySelector('#marcador');
        const video = document.querySelector('#video-teste');

        // Dispara o vídeo ao encontrar o papel com o desenho
        marcador.addEventListener('markerFound', function() {
            video.play();
        });

        // Pausa o vídeo se perder o papel de vista
        marcador.addEventListener('markerLost', function() {
            video.pause();
        });
    </script>
</body>
</html>
