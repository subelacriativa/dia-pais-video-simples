<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma Surpresa Especial Para Você! ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Cartão de Mensagem Principal */
        .cartao-surpresa {
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 35px 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: surgir 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        .icone-coracao {
            font-size: 3rem;
            color: #ff5e62;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulsar 1.5s infinite;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .mensagem {
            color: #5a6c7d;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-style: italic;
            background: #f9fbfc;
            padding: 20px;
            border-radius: 16px;
            border-left: 4px solid #ff5e62;
        }

        .btn-play {
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 20px rgba(255, 94, 98, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-play:active {
            transform: scale(0.98);
        }

        /* CORREÇÃO DO VÍDEO: Fica na tela, mas invisível e sem atrapalhar o clique */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        /* Classe ativada por JavaScript para trazer o vídeo para a frente em tela cheia */
        video.modo-tela-cheia {
            opacity: 1;
            pointer-events: auto;
            z-index: 9999;
        }

        @keyframes surgir {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .rodape {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #a0aec0;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="cartao-surpresa" id="cartao">
        <span class="icone-coracao">❤️</span>
        <h1>Para o Melhor Pai!</h1>
        
        <div class="mensagem">
            "Pai, cada momento ao seu lado é uma memória que guardo para sempre no coração. Obrigado por ser meu porto seguro, meu herói e meu melhor amigo. Preparei uma surpresa em vídeo para você lembrar o quanto te amo!"
        </div>

        <button class="btn-play" id="player-trigger">
            <span>▶️</span> CLIQUE AQUI PARA VER A MÁGICA
        </button>

        <div class="rodape">SU BELA CRIATIVA</div>
    </div>

    <video id="video-principal" src="https://raw.githubusercontent.com/subelacriativa/ra/main/20260524_083410.mp4" crossorigin="anonymous" playsinline webkit-playsinline></video>

    <script>
        const botao = document.getElementById('player-trigger');
        const video = document.getElementById('video-principal');

        botao.addEventListener('click', function() {
            // 1. Torna o vídeo visível e joga para a frente antes do comando de tela cheia
            video.classList.add('modo-tela-cheia');

            // 2. Tenta abrir a tela cheia nativa do dispositivo
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) { /* Dispositivos iOS / Safari */
                video.webkitRequestFullscreen();
            } else if (video.webkitEnterFullscreen) { /* Fallback alternativo para iPhones antigos */
                video.webkitEnterFullscreen();
            }

            // 3. Dá o Play no vídeo com áudio liberado
            video.play().catch(error => {
                console.log("Erro ao reproduzir vídeo:", error);
            });
        });

        // Monitora quando o utilizador sai da tela cheia para esconder o vídeo novamente
        document.addEventListener('fullscreenchange', checarSaidaTelaCheia);
        document.addEventListener('webkitfullscreenchange', checarSaidaTelaCheia);

        function checarSaidaTelaCheia() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                video.pause();
                video.classList.remove('modo-tela-cheia'); // Esconde o player e volta para o cartão de mensagem
            }
        }
        
        // Correção específica para o comportamento do iOS Safari
        video.addEventListener('webkitendfullscreen', function() {
            video.pause();
            video.classList.remove('modo-tela-cheia');
        });
    </script>
</body>
</html>
